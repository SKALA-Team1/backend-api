version: '3.8'

services:
  # Qdrant (벡터 DB - 에이전트1 RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: skala-qdrant
    ports:
      - "6333:6333"  # API + Dashboard
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - skala-network

  # Redis (세션 저장소)
  redis:
    image: redis:7-alpine
    container_name: skala-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - skala-network

  # MinIO (S3 호환 오브젝트 스토리지)
  minio:
    image: minio/minio:latest
    container_name: skala-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - skala-network

  # MinIO Client (버킷 자동 생성)
  minio-init:
    image: minio/mc:latest
    container_name: skala-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing myminio/skala;
      mc anonymous set download myminio/skala;
      echo 'MinIO bucket created: skala';
      "
    networks:
      - skala-network

volumes:
  qdrant-data:
  redis-data:
  minio-data:

networks:
  skala-network:
    driver: bridge