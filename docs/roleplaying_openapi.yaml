# Swagger 포트 가이드 (MinIO 9000/9001과 충돌 방지):
#   - Spring1 Swagger: http://localhost:9100
#   - Spring2 Swagger: http://localhost:9101
#   - FastAPI Swagger: http://localhost:9102 (이 파일)
# FastAPI 서버 자체는 아래 명령으로 띄울 수 있다.
#   uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
# 별도 YAML을 Swagger UI에 연결하고 싶다면 다음 명령으로 swagger-ui-dist를 띄워 이 파일을 불러오면 된다.
#   npx swagger-ui-watcher ./docs/roleplaying_openapi.yaml --port 9102
openapi: 3.0.3
info:
  title: SKALA Backend API
  version: "0.2.0"
  description: |
    FastAPI endpoints that currently exist in the repository. This document was
    assembled directly from the implemented routers/services so it can be
    imported into Swagger UI or similar tooling without generating a new spec
    at runtime.
servers:
  - url: https://api.skala.local
tags:
  - name: health
    description: Lightweight probes used for uptime checks
  - name: roleplaying
    description: HTTP APIs that provision AI roleplaying sessions
  - name: websocket
    description: Real-time WebSocket used during active roleplaying sessions
paths:
  /:
    get:
      tags: [health]
      summary: Root greeting
      description: Convenience endpoint that FastAPI exposes for simple smoke tests.
      responses:
        '200':
          description: The service is responding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'
  /health/health/ping:
    get:
      tags: [health]
      summary: Service health probe
      description: Returns a static payload so orchestration systems can check liveness.
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
  /roleplaying/health/ping:
    get:
      tags: [health]
      summary: Roleplaying-specific health probe
      description: Identical to the general probe but namespaced under the roleplaying router.
      responses:
        '200':
          description: Roleplaying router is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
  /roleplaying/internal/scenarios/analyze-conversation:
    post:
      tags: [roleplaying]
      summary: Analyze Slack conversation and generate scenarios
      description: |
        Internal API that Spring 2 calls with Slack conversation history. The service validates
        the payload, runs LLM-based analysis, and returns one overview scenario plus three
        detailed scenarios with fixed questions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequestDto'
      responses:
        '200':
          description: Successfully generated scenarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResultDto'
        '400':
          description: Validation failed (e.g., messages list was empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: LLM failure or downstream service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /roleplaying/sessions:
    post:
      tags: [roleplaying]
      summary: Issue a real-time roleplaying session
      description: |
        Looks up the requested scenario, persists an expiring session in Redis, and returns
        the WebSocket URL the client must connect to for the real-time experience.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '200':
          description: Session issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreateResponse'
        '404':
          description: Scenario was not found for the requesting user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected Redis/DB/RPC failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ws/roleplaying/{session_id}:
    get:
      tags: [websocket]
      summary: Real-time roleplaying WebSocket
      description: |
        After issuing a session via `POST /roleplaying/sessions`, the client upgrades the
        connection here. The server validates the Redis session, waits for an `INIT` message,
        and then alternates between STT ingestion and AI responses. Audio chunks are sent as
        binary frames while all control payloads are JSON.
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
          description: Session identifier returned from `/roleplaying/sessions`
      responses:
        '101':
          description: WebSocket upgrade completed
      x-websocket-messages:
        inbound:
          - $ref: '#/components/schemas/InitMessage'
          - $ref: '#/components/schemas/UtteranceEndMessage'
          - $ref: '#/components/schemas/UserTextMessage'
          - $ref: '#/components/schemas/EndSessionMessage'
        outbound:
          - $ref: '#/components/schemas/AckMessage'
          - $ref: '#/components/schemas/AiTextMessage'
          - $ref: '#/components/schemas/SttPartialMessage'
          - $ref: '#/components/schemas/SttFinalMessage'
          - $ref: '#/components/schemas/UtteranceSavedMessage'
          - $ref: '#/components/schemas/AiTypingMessage'
          - $ref: '#/components/schemas/SessionEndedMessage'
          - $ref: '#/components/schemas/ErrorMessage'
components:
  schemas:
    RootResponse:
      type: object
      properties:
        message:
          type: string
          example: hello
      required:
        - message
    PingResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: Failed to analyze conversation
      required:
        - detail
    SlackMessageDto:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        senderName:
          type: string
        text:
          type: string
        myMessage:
          type: boolean
          default: false
      required:
        - timestamp
        - senderName
        - text
    AnalysisRequestDto:
      type: object
      properties:
        userId:
          type: integer
          minimum: 1
        myRole:
          type: string
        conversationDate:
          type: string
          format: date
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SlackMessageDto'
        aiRoles:
          type: array
          minItems: 1
          items:
            type: string
      required:
        - userId
        - myRole
        - conversationDate
        - messages
        - aiRoles
    SubjectInfoDto:
      type: object
      properties:
        myRole:
          type: string
        situation:
          type: string
        conversationDate:
          type: string
          format: date
        messageCount:
          type: integer
          minimum: 0
      required:
        - myRole
        - situation
        - conversationDate
        - messageCount
    ScenarioInfoDto:
      type: object
      properties:
        aiRole:
          type: string
        topicType:
          type: string
          enum: [overview, detail]
        title:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - aiRole
        - topicType
        - title
        - fixedQuestions
    AnalysisResultDto:
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/SubjectInfoDto'
        scenarios:
          type: array
          minItems: 4
          maxItems: 4
          items:
            $ref: '#/components/schemas/ScenarioInfoDto'
      required:
        - subject
        - scenarios
    SessionCreateRequest:
      type: object
      properties:
        userId:
          type: integer
          minimum: 1
        scenarioId:
          type: integer
          minimum: 1
        sessionId:
          type: string
          format: uuid
          nullable: true
          description: Existing session identifier to reuse; omit to auto-generate
      required:
        - userId
        - scenarioId
    ScenarioDetail:
      type: object
      properties:
        scenarioId:
          type: integer
        subjectId:
          type: integer
        myRole:
          type: string
        aiRole:
          type: string
        title:
          type: string
        topicType:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - scenarioId
        - subjectId
        - myRole
        - aiRole
        - title
        - topicType
        - fixedQuestions
    SessionCreateResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        ws_url:
          type: string
          format: uri
        scenario:
          $ref: '#/components/schemas/ScenarioDetail'
        expires_at:
          type: string
          format: date-time
      required:
        - session_id
        - ws_url
        - scenario
        - expires_at
    InitMessage:
      type: object
      properties:
        type:
          type: string
          enum: [INIT]
        userId:
          type: integer
          minimum: 1
        subjectId:
          type: integer
          minimum: 1
        myRole:
          type: string
        aiRole:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - type
        - userId
        - subjectId
        - myRole
        - aiRole
        - fixedQuestions
    UtteranceEndMessage:
      type: object
      properties:
        type:
          type: string
          enum: [UTTERANCE_END]
      required:
        - type
    UserTextMessage:
      type: object
      description: Text message shortcut used for testing without streaming audio.
      properties:
        type:
          type: string
          enum: [USER_TEXT]
        text:
          type: string
          minLength: 1
      required:
        - type
        - text
    EndSessionMessage:
      type: object
      properties:
        type:
          type: string
          enum: [END_SESSION]
      required:
        - type
    AckMessage:
      type: object
      properties:
        type:
          type: string
          enum: [ACK]
        message:
          type: string
      required:
        - type
        - message
    AiTextMessage:
      type: object
      properties:
        type:
          type: string
          enum: [AI_TEXT]
        text:
          type: string
        is_fixed_question:
          type: boolean
          default: false
      required:
        - type
        - text
    SttPartialMessage:
      type: object
      properties:
        type:
          type: string
          enum: [STT_PARTIAL]
        text:
          type: string
      required:
        - type
        - text
    SttFinalMessage:
      type: object
      properties:
        type:
          type: string
          enum: [STT_FINAL]
        text:
          type: string
      required:
        - type
        - text
    UtteranceSavedMessage:
      type: object
      properties:
        type:
          type: string
          enum: [UTTERANCE_SAVED]
        index:
          type: integer
          minimum: 0
      required:
        - type
        - index
    AiTypingMessage:
      type: object
      properties:
        type:
          type: string
          enum: [AI_TYPING]
      required:
        - type
    SessionEndedMessage:
      type: object
      properties:
        type:
          type: string
          enum: [SESSION_ENDED]
        reason:
          type: string
          enum: [user_end, timeout, disconnected, error, turn_limit]
      required:
        - type
        - reason
    ErrorMessage:
      type: object
      properties:
        type:
          type: string
          enum: [ERROR]
        message:
          type: string
        code:
          type: string
          nullable: true
      required:
        - type
        - message
