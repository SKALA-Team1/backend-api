openapi: 3.0.3
info:
  title: SKALA Roleplaying API
  version: "0.1.0"
  description: |
    REST + WebSocket endpoints currently implemented for the AI roleplaying flow.
    Generated manually from the FastAPI router/service code.
servers:
  - url: https://api.skala.local
paths:
  /roleplaying/health/ping:
    get:
      summary: Health check
      description: Return a simple status payload used by uptime checks.
      tags:
        - roleplaying
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
  /roleplaying/internal/scenarios/analyze-conversation:
    post:
      summary: Analyze Slack conversation and generate scenarios
      description: |
        Internal endpoint Spring 2 uses to request Slack-conversation analysis
        and receive four practice scenarios (1 overview + 3 detail) containing
        the pre-generated fixed questions.
      tags:
        - roleplaying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequestDto'
      responses:
        '200':
          description: Successfully generated scenarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResultDto'
        '400':
          description: Missing messages or invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: LLM failure or other server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /roleplaying/sessions:
    post:
      summary: Create WebSocket roleplaying session
      description: |
        Validate that the requested scenario belongs to the user, then create
        a UUID session entry in Redis (TTL 2h) and return the WebSocket URL
        the client should connect to.
      tags:
        - roleplaying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '200':
          description: Session issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreateResponse'
        '404':
          description: Scenario not found for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Redis/DB failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ws/roleplaying/{session_id}:
    get:
      summary: Real-time roleplaying WebSocket
      description: |
        After obtaining a session via `POST /roleplaying/sessions`, the client
        connects here using the returned `session_id`. The server immediately
        validates the Redis entry, waits for an `INIT` message, and then streams
        audio/STT/AI responses. The handshake itself is standard WebSocket; all
        payloads are JSON except binary audio chunks.
      tags:
        - roleplaying
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
          description: UUID generated by `/roleplaying/sessions`
      responses:
        '101':
          description: WebSocket upgrade (messages defined in components)
      x-websocket-messages:
        inbound:
          - $ref: '#/components/schemas/InitMessage'
          - $ref: '#/components/schemas/UtteranceEndMessage'
          - $ref: '#/components/schemas/UserTextMessage'
          - $ref: '#/components/schemas/EndSessionMessage'
        outbound:
          - $ref: '#/components/schemas/AckMessage'
          - $ref: '#/components/schemas/AiTextMessage'
          - $ref: '#/components/schemas/SttFinalMessage'
          - $ref: '#/components/schemas/UtteranceSavedMessage'
          - $ref: '#/components/schemas/AiTypingMessage'
          - $ref: '#/components/schemas/SessionEndedMessage'
          - $ref: '#/components/schemas/ErrorMessage'
components:
  schemas:
    PingResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required:
        - detail
    SlackMessageDto:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        senderName:
          type: string
        text:
          type: string
        myMessage:
          type: boolean
          default: false
      required:
        - timestamp
        - senderName
        - text
    MessageRole:
      type: object
      properties:
        content:
          type: string
        sender:
          type: string
        mine:
          type: boolean
      required:
        - content
        - sender
    AnalysisRequestDto:
      type: object
      properties:
        userId:
          type: integer
          minimum: 1
        myRole:
          type: string
        conversationDate:
          type: string
          format: date
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SlackMessageDto'
        aiRoles:
          type: array
          minItems: 1
          items:
            type: string
      required:
        - userId
        - myRole
        - conversationDate
        - messages
        - aiRoles
    SubjectInfoDto:
      type: object
      properties:
        myRole:
          type: string
        situation:
          type: string
        conversationDate:
          type: string
          format: date
        messageCount:
          type: integer
          minimum: 0
      required:
        - myRole
        - situation
        - conversationDate
        - messageCount
    ScenarioInfoDto:
      type: object
      properties:
        aiRole:
          type: string
        topicType:
          type: string
          enum:
            - overview
            - detail
        title:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - aiRole
        - topicType
        - title
        - fixedQuestions
    AnalysisResultDto:
      type: object
      properties:
        subject:
          $ref: '#/components/schemas/SubjectInfoDto'
        scenarios:
          type: array
          minItems: 4
          maxItems: 4
          items:
            $ref: '#/components/schemas/ScenarioInfoDto'
      required:
        - subject
        - scenarios
    SessionCreateRequest:
      type: object
      properties:
        userId:
          type: integer
          minimum: 1
        scenarioId:
          type: integer
          minimum: 1
        sessionId:
          type: integer
          description: Existing numeric session ID (if already issued)
      required:
        - userId
        - scenarioId
    ScenarioDetail:
      type: object
      properties:
        scenarioId:
          type: integer
        subjectId:
          type: integer
        myRole:
          type: string
        aiRole:
          type: string
        title:
          type: string
        topicType:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - scenarioId
        - subjectId
        - myRole
        - aiRole
        - title
        - topicType
        - fixedQuestions
    SessionCreateResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        ws_url:
          type: string
          format: uri
        scenario:
          $ref: '#/components/schemas/ScenarioDetail'
        expires_at:
          type: string
          format: date-time
      required:
        - session_id
        - ws_url
        - scenario
        - expires_at
    InitMessage:
      type: object
      properties:
        type:
          type: string
          enum: [INIT]
        userId:
          type: integer
        subjectId:
          type: integer
        myRole:
          type: string
        aiRole:
          type: string
        fixedQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string
      required:
        - type
        - userId
        - subjectId
        - myRole
        - aiRole
        - fixedQuestions
    UtteranceEndMessage:
      type: object
      properties:
        type:
          type: string
          enum: [UTTERANCE_END]
      required:
        - type
    UserTextMessage:
      type: object
      description: |
        Text-based user message (testing/debugging only).
        Allows sending user utterances as text without audio/STT processing.
        For production use, prefer audio-based AUDIO_CHUNK messages.
      properties:
        type:
          type: string
          enum: [USER_TEXT]
        text:
          type: string
          minLength: 1
          description: User utterance text
      required:
        - type
        - text
    EndSessionMessage:
      type: object
      properties:
        type:
          type: string
          enum: [END_SESSION]
      required:
        - type
    AckMessage:
      type: object
      properties:
        type:
          type: string
          enum: [ACK]
        message:
          type: string
      required:
        - type
        - message
    AiTextMessage:
      type: object
      properties:
        type:
          type: string
          enum: [AI_TEXT]
        text:
          type: string
        is_fixed_question:
          type: boolean
      required:
        - type
        - text
    SttFinalMessage:
      type: object
      properties:
        type:
          type: string
          enum: [STT_FINAL]
        text:
          type: string
      required:
        - type
        - text
    UtteranceSavedMessage:
      type: object
      properties:
        type:
          type: string
          enum: [UTTERANCE_SAVED]
        index:
          type: integer
          minimum: 0
      required:
        - type
        - index
    AiTypingMessage:
      type: object
      properties:
        type:
          type: string
          enum: [AI_TYPING]
    SessionEndedMessage:
      type: object
      properties:
        type:
          type: string
          enum: [SESSION_ENDED]
        reason:
          type: string
          enum: [user_end, timeout, disconnected, error]
      required:
        - type
        - reason
    ErrorMessage:
      type: object
      properties:
        type:
          type: string
          enum: [ERROR]
        message:
          type: string
        code:
          type: string
      required:
        - type
        - message
